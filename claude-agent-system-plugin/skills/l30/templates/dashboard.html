<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>l30 Research Dashboard</title>
<style>
:root {
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --bg-input: #141720;
    --bg-hover: #22253a;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-dim: #8b8d97;
    --text-muted: #5a5d6a;
    --accent: #14b8a6;
    --accent-hover: #0d9488;
    --accent-dim: rgba(20, 184, 166, 0.15);
    --accent-glow: rgba(20, 184, 166, 0.08);
    --success: #22c55e;
    --error: #ef4444;
    --warning: #f59e0b;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
[data-theme="light"] {
    --bg: #f8fafc;
    --bg-card: #ffffff;
    --bg-input: #f1f5f9;
    --bg-hover: #e8ecf0;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-dim: #64748b;
    --text-muted: #94a3b8;
    --accent: #0d9488;
    --accent-hover: #0f766e;
    --accent-dim: rgba(13, 148, 136, 0.1);
    --accent-glow: rgba(13, 148, 136, 0.05);
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
}
header {
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 2rem;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    backdrop-filter: blur(12px);
}
.header-content {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 0.75rem;
}
.logo { font-size: 1.4rem; font-weight: 800; color: var(--accent); letter-spacing: -0.02em; }
.version {
    font-size: 0.7rem; color: var(--text-dim);
    background: var(--accent-dim); padding: 0.1rem 0.45rem;
    border-radius: 999px;
}
.btn-icon {
    margin-left: auto; background: none; border: 1px solid var(--border);
    color: var(--text-dim); width: 34px; height: 34px; border-radius: 50%;
    cursor: pointer; font-size: 0.9rem; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }
main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }

/* Summary Panel */
.summary-panel {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem; box-shadow: var(--shadow);
}
.summary-query {
    font-size: 1.3rem; font-weight: 700; color: var(--accent);
    margin-bottom: 0.4rem;
}
.summary-meta {
    font-size: 0.85rem; color: var(--text-dim);
    display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem;
}
.summary-sources {
    display: flex; gap: 0.4rem; flex-wrap: wrap;
}
.source-pill {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem;
    font-weight: 600; color: #fff;
}
.source-pill .count { opacity: 0.85; font-weight: 400; }
.source-pill.hackernews { background: #ff6600; }
.source-pill.reddit { background: #ff4500; }
.source-pill.duckduckgo { background: #22c55e; }
.source-pill.lobsters { background: #ac2222; }
.source-pill.github { background: #6e7681; }
.source-pill.error { background: var(--error); opacity: 0.7; }

/* Controls */
.controls {
    display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;
    margin-bottom: 1.25rem;
}
.controls select, .controls input {
    padding: 0.4rem 0.7rem; background: var(--bg-input);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-size: 0.82rem; outline: none;
    transition: border-color 0.2s;
}
.controls select:focus, .controls input:focus { border-color: var(--accent); }
.controls input { flex: 1; min-width: 160px; }
.controls input::placeholder { color: var(--text-muted); }
.btn-sm {
    padding: 0.35rem 0.7rem; background: var(--bg-input);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text-dim); font-size: 0.78rem; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.results-count {
    font-size: 0.82rem; color: var(--text-dim); margin-left: auto;
    white-space: nowrap;
}

/* Result Cards */
.results-list { display: flex; flex-direction: column; gap: 0.6rem; }
.result-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.25rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer; position: relative; overflow: hidden;
}
.result-card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-glow); }
.result-rank {
    position: absolute; top: 0; left: 0;
    background: var(--accent-dim); color: var(--accent);
    font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem;
    border-radius: 0 0 var(--radius) 0;
}
.result-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 1rem; margin-bottom: 0.3rem;
}
.result-title {
    font-size: 0.95rem; font-weight: 600; color: var(--text);
    text-decoration: none; line-height: 1.4; flex: 1;
}
.result-title:hover { color: var(--accent); }
.result-score-area {
    display: flex; flex-direction: column; align-items: flex-end;
    gap: 0.2rem; min-width: 4.5rem;
}
.result-score-num { font-size: 1rem; font-weight: 800; color: var(--accent); }
.score-bar {
    width: 4rem; height: 5px; background: var(--border);
    border-radius: 3px; overflow: hidden;
}
.score-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.result-meta {
    display: flex; gap: 0.6rem; flex-wrap: wrap; font-size: 0.78rem;
    color: var(--text-dim); margin-bottom: 0.4rem; align-items: center;
}
.result-badge {
    padding: 0.12rem 0.5rem; border-radius: 999px; font-size: 0.7rem;
    font-weight: 600; color: #fff;
}
.result-badge.hackernews { background: #ff6600; }
.result-badge.reddit { background: #ff4500; }
.result-badge.duckduckgo { background: #22c55e; }
.result-badge.lobsters { background: #ac2222; }
.result-badge.github { background: #6e7681; }
.result-url {
    font-size: 0.72rem; color: var(--text-muted); word-break: break-all;
    margin-bottom: 0.3rem;
}
.result-url a { color: var(--text-muted); text-decoration: none; }
.result-url a:hover { color: var(--accent); text-decoration: underline; }
.result-snippet {
    font-size: 0.85rem; color: var(--text-dim); line-height: 1.6;
    margin-bottom: 0.4rem;
}
.result-snippet.collapsed {
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
}
.result-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.4rem; }
.result-tag {
    font-size: 0.68rem; padding: 0.1rem 0.4rem;
    background: var(--accent-dim); color: var(--accent);
    border-radius: 4px;
}
.result-comments {
    margin-top: 0.6rem; padding-top: 0.6rem;
    border-top: 1px solid var(--border);
}
.result-comments.hidden { display: none; }
.comments-header {
    font-size: 0.75rem; font-weight: 600; color: var(--text-dim);
    margin-bottom: 0.4rem;
}
.comment {
    font-size: 0.8rem; color: var(--text-dim); padding: 0.5rem 0.7rem;
    margin-bottom: 0.35rem; background: var(--bg-input);
    border-radius: var(--radius); border-left: 3px solid var(--accent-dim);
    line-height: 1.5;
}
.expand-hint {
    font-size: 0.72rem; color: var(--text-muted); text-align: center;
    padding: 0.3rem; margin-top: 0.3rem;
}

footer {
    text-align: center; padding: 2rem; color: var(--text-muted);
    font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 3rem;
}
.hidden { display: none !important; }
@media (max-width: 640px) {
    main { padding: 1rem; }
    .controls { flex-direction: column; }
    .result-header { flex-direction: column; gap: 0.25rem; }
    .result-score-area { flex-direction: row; align-items: center; }
    header { padding: 0.75rem 1rem; }
}
</style>
</head>
<body>
<header>
    <div class="header-content">
        <span class="logo">l30</span>
        <span class="version">v0.1.0</span>
        <button class="btn-icon" id="theme-toggle" title="Toggle theme">&#9684;</button>
    </div>
</header>
<main>
    <div class="summary-panel" id="summary"></div>
    <div class="controls" id="controls">
        <select id="sort-select">
            <option value="score">Sort by Score</option>
            <option value="date">Sort by Date</option>
            <option value="engagement">Sort by Engagement</option>
        </select>
        <select id="filter-source">
            <option value="all">All Sources</option>
            <option value="hackernews">Hacker News</option>
            <option value="reddit">Reddit</option>
            <option value="duckduckgo">DuckDuckGo</option>
            <option value="lobsters">Lobsters</option>
            <option value="github">GitHub</option>
        </select>
        <input type="text" id="search-input" placeholder="Search within results...">
        <button class="btn-sm" id="expand-all-btn">Expand All</button>
        <button class="btn-sm" id="collapse-all-btn">Collapse All</button>
        <span class="results-count" id="results-count"></span>
    </div>
    <div class="results-list" id="results-list"></div>
</main>
<footer>l30 &mdash; Free topic research tool. No API keys required.</footer>

<script>
const REPORT_DATA = /* REPORT_DATA_PLACEHOLDER */;

const $ = (s) => document.querySelector(s);
const report = REPORT_DATA.report;
const statuses = REPORT_DATA.statuses || [];
let allResults = report.results || [];
let expandedAll = false;

function el(tag, attrs, children) {
    const e = document.createElement(tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) {
        if (k === 'className') e.className = v;
        else if (k === 'textContent') e.textContent = v;
        else if (k === 'onclick') e.addEventListener('click', v);
        else if (k === 'title') e.title = v;
        else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
        else e.setAttribute(k, v);
    }
    if (children) for (const c of children) {
        if (typeof c === 'string') e.appendChild(document.createTextNode(c));
        else if (c) e.appendChild(c);
    }
    return e;
}

// Theme
$('#theme-toggle').addEventListener('click', () => {
    const h = document.documentElement;
    const next = h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    h.setAttribute('data-theme', next);
    try { localStorage.setItem('l30-theme', next); } catch {}
});
try {
    const saved = localStorage.getItem('l30-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
} catch {}

// Summary
function renderSummary() {
    const s = $('#summary');
    const query = el('div', {className: 'summary-query'}, [
        '"' + report.query + '"'
    ]);

    const searchedAt = report.searched_at ? new Date(report.searched_at).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'}) : '';
    const meta = el('div', {className: 'summary-meta'}, [
        el('span', {}, [report.total_final + ' results']),
        el('span', {}, [report.sources_used.length + ' sources']),
        el('span', {}, [report.duration_seconds + 's']),
        searchedAt ? el('span', {}, [searchedAt]) : null,
    ].filter(Boolean));

    const pills = el('div', {className: 'summary-sources'});
    for (const st of statuses) {
        const cls = st.status === 'error' ? 'source-pill error' : 'source-pill ' + st.name;
        const pill = el('span', {className: cls}, [
            st.name,
            el('span', {className: 'count'}, [
                st.status === 'error' ? ' \u2717' : ' ' + st.result_count
            ]),
        ]);
        if (st.error) pill.title = st.error;
        pills.appendChild(pill);
    }

    s.replaceChildren(query, meta, pills);
}

// Results
function buildCard(r, idx) {
    const expanded = idx < 5;
    const card = el('div', {className: 'result-card' + (expanded ? ' expanded' : '')});
    card.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return;
        card.classList.toggle('expanded');
        updateCardVisibility(card);
    });

    // Rank badge
    card.appendChild(el('span', {className: 'result-rank'}, ['#' + (idx + 1)]));

    // Header: title + score
    const scorePercent = Math.min(100, Math.round(r.final_score * 100));
    const header = el('div', {className: 'result-header'}, [
        el('a', {className: 'result-title', href: r.url, target: '_blank', rel: 'noopener', onclick: (e) => e.stopPropagation()}, [r.title]),
        el('div', {className: 'result-score-area'}, [
            el('span', {className: 'result-score-num'}, [r.final_score.toFixed(2)]),
            el('div', {className: 'score-bar'}, [
                el('div', {className: 'score-bar-fill', style: {width: scorePercent + '%'}}),
            ]),
        ]),
    ]);
    card.appendChild(header);

    // Meta
    const metaParts = [
        el('span', {className: 'result-badge ' + r.source}, [r.source]),
    ];
    if (r.date) metaParts.push(el('span', {}, [new Date(r.date).toLocaleDateString('en-US', {month: 'short', day: 'numeric'})]));
    if (r.score > 0) metaParts.push(el('span', {}, ['\u2191' + r.score]));
    if (r.comment_count > 0) metaParts.push(el('span', {}, [r.comment_count + ' comments']));
    if (r.author) metaParts.push(el('span', {}, ['by ' + r.author]));
    if (r.subreddit) metaParts.push(el('span', {}, ['r/' + r.subreddit]));
    card.appendChild(el('div', {className: 'result-meta'}, metaParts));

    // URL
    const urlLink = el('a', {href: r.url, target: '_blank', rel: 'noopener', onclick: (e) => e.stopPropagation()}, [r.url]);
    card.appendChild(el('div', {className: 'result-url'}, [urlLink]));

    // Snippet
    if (r.snippet) {
        card.appendChild(el('div', {
            className: 'result-snippet' + (expanded ? '' : ' collapsed'),
        }, [r.snippet]));
    }

    // Tags
    if (r.tags && r.tags.length > 0) {
        card.appendChild(el('div', {className: 'result-tags'},
            r.tags.map(t => el('span', {className: 'result-tag'}, [t]))
        ));
    }

    // Comments
    if (r.comments && r.comments.length > 0) {
        const commentsDiv = el('div', {className: 'result-comments' + (expanded ? '' : ' hidden')}, [
            el('div', {className: 'comments-header'}, ['Top Comments (' + r.comments.length + ')']),
            ...r.comments.slice(0, 5).map(c =>
                el('div', {className: 'comment'}, [c.length > 400 ? c.substring(0, 400) + '\u2026' : c])
            ),
        ]);
        card.appendChild(commentsDiv);
    }

    // Expand hint for collapsed cards
    if (!expanded && (r.comments && r.comments.length > 0 || (r.snippet && r.snippet.length > 100))) {
        card.appendChild(el('div', {className: 'expand-hint'}, ['Click to expand']));
    }

    return card;
}

function updateCardVisibility(card) {
    const expanded = card.classList.contains('expanded');
    const snippet = card.querySelector('.result-snippet');
    const comments = card.querySelector('.result-comments');
    const hint = card.querySelector('.expand-hint');
    if (snippet) snippet.classList.toggle('collapsed', !expanded);
    if (comments) comments.classList.toggle('hidden', !expanded);
    if (hint) hint.classList.toggle('hidden', expanded);
}

function renderResults(results) {
    const container = $('#results-list');
    if (!results || results.length === 0) {
        container.replaceChildren(el('div', {style: {textAlign: 'center', padding: '3rem', color: 'var(--text-dim)'}}, ['No results match your filters.']));
        $('#results-count').textContent = '0 shown';
        return;
    }
    container.replaceChildren(...results.map((r, i) => buildCard(r, i)));
    $('#results-count').textContent = results.length + ' shown';
}

// Filtering & Sorting
function getFilteredResults() {
    let results = [...allResults];

    const sourceFilter = $('#filter-source').value;
    if (sourceFilter !== 'all') {
        results = results.filter(r => r.source === sourceFilter);
    }

    const searchText = $('#search-input').value.toLowerCase().trim();
    if (searchText) {
        results = results.filter(r => {
            const haystack = (r.title + ' ' + r.snippet + ' ' + (r.tags || []).join(' ')).toLowerCase();
            return haystack.includes(searchText);
        });
    }

    const sort = $('#sort-select').value;
    if (sort === 'date') {
        results.sort((a, b) => {
            const da = a.date ? new Date(a.date).getTime() : 0;
            const db = b.date ? new Date(b.date).getTime() : 0;
            return db - da;
        });
    } else if (sort === 'engagement') {
        results.sort((a, b) => (b.score + b.comment_count) - (a.score + a.comment_count));
    } else {
        results.sort((a, b) => b.final_score - a.final_score);
    }

    return results;
}

function refresh() { renderResults(getFilteredResults()); }

$('#sort-select').addEventListener('change', refresh);
$('#filter-source').addEventListener('change', refresh);
$('#search-input').addEventListener('input', refresh);

$('#expand-all-btn').addEventListener('click', () => {
    document.querySelectorAll('.result-card').forEach(card => {
        card.classList.add('expanded');
        updateCardVisibility(card);
    });
});
$('#collapse-all-btn').addEventListener('click', () => {
    document.querySelectorAll('.result-card').forEach(card => {
        card.classList.remove('expanded');
        updateCardVisibility(card);
    });
});

// Set page title
document.title = 'l30: ' + report.query;

// Initial render
renderSummary();
renderResults(allResults);
</script>
</body>
</html>
